<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" mode="side">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link" (click)="drawer.toggle()">Dashboard</a>
      <a mat-list-item routerLink="/bvCentresList" routerLinkActive="active-link" (click)="drawer.toggle()">Filter by Samithi</a>
      <a mat-list-item routerLink="/page2" routerLinkActive="active-link" (click)="drawer.toggle()">Page 2</a>
      <mat-divider></mat-divider>
      <a [href]="constants.SSSBV_URL" target="_blank" mat-list-item>Sri Sathya Sai Balvikas</a>
      <a [href]="constants.TN_ORG_URL" target="_blank" mat-list-item>Sri Sathya Sai Seva Organisations, TamilNadu</a>
      <a [href]="constants.INDIA_ORG_URL" target="_blank" mat-list-item>Sri Sathya Sai Seva Organisations, India</a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar>
      <button mat-icon-button (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <h5 style="color:white; margin: 0 16px;">Aum Sri Sairam</h5>
      <span style="flex: 1;"></span>
      <i class="fa-solid fa-power-off fa-lg sign-in-btn" aria-hidden="true" (click)="authenticateUser()"></i>
    </mat-toolbar>
    <div class="header-wrapper">
      <img src="assets/images/balvikas-logo.jpg" alt="Balvikas Logo" class="bv-logo" />
      <h1>Sri Sathya Sai Balvikas Locator</h1>
    </div>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
